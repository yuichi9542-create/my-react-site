<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本日のしおり</title>

    <!-- スマホのブラウザUI（アドレスバー周り）をアプリの紙色に馴染ませる -->
    <meta name="theme-color" content="#F6F3EA" />

    <!-- 検索エンジンに拾われないように -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- URLを共有したときのプレビューカードを無害な内容に固定（ネタバレ防止） -->
    <meta property="og:title" content="本日のしおり" />
    <meta property="og:description" content="7.18 SAT" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="本日のしおり" />
    <meta name="twitter:description" content="7.18 SAT" />

    <!-- 白画面対策：アプリ(約2.7MB)の読み込み中も紙色の静かな画面を保ち、
         中央で小さな点が脈打つ。Reactがマウントすると自然に消える -->
    <style>
      html, body { margin: 0; padding: 0; background: #F6F3EA; min-height: 100%; }
      #root:empty::before {
        content: "";
        position: fixed; top: 50%; left: 50%;
        width: 7px; height: 7px; margin: -3.5px 0 0 -3.5px;
        border-radius: 50%; background: #B9B2A2;
        animation: shiori-pulse 1.6s ease-in-out infinite;
      }
      @keyframes shiori-pulse {
        0%, 100% { opacity: 0.3; }
        50%      { opacity: 0.9; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
